    <!-- Prevent Meta Pixel crashing on fetch override -->
    <script>
      try {
        var fetchDesc = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (fetchDesc && !fetchDesc.set && fetchDesc.configurable) {

            set: function() { console.warn('Ignored attempt to set window.fetch'); },
            configurable: true,
            enumerable: fetchDesc.enumerable
          });
        }
      } catch (e) {}
    </script>
